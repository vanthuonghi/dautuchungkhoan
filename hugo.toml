baseURL = "https://dautuchungkhoan.pages.dev" # Thay bằng domain thực tế
languageCode = "vi-VN"
title = "Đầu Tư Chứng Khoán Thực Chiến | Văn Hỉ"
theme = "PaperMod"

# Tối ưu SEO & Tốc độ
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

# BẬT TÍNH NĂNG TÌM KIẾM CỦA PAPERMOD (Tạo file dữ liệu JSON)
[outputs]
    home = ["HTML", "RSS", "JSON"]

# Cho phép nhúng mã HTML (Cần thiết để chèn Iframe biểu đồ TradingView hoặc Video YouTube)
[markup.goldmark.renderer]
    unsafe = true

[params]
    # Giao diện PaperMod
    defaultTheme = "auto"
    ShowReadingTime = true
    ShowShareButtons = true
    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    description = "Chia sẻ kiến thức đầu tư chứng khoán, phân tích thị trường và hướng dẫn thực chiến cùng Văn Hỉ"
    author = "Văn Hỉ"

    # Màu chủ đạo & Favicon (Đổi link sang logo của trang chứng khoán)
    [params.assets]
        disableHLJS = true
        favicon = "https://img.domain-cua-em.com/logo-ck.png"
        favicon16x16 = "https://img.domain-cua-em.com/logo-ck.png"
        favicon32x32 = "https://img.domain-cua-em.com/logo-ck.png"
        apple_touch_icon = "https://img.domain-cua-em.com/logo-ck.png"
        safari_pinned_tab = "https://img.domain-cua-em.com/logo-ck.png"

    # SEO Trang chủ
    [params.homeInfoParams]
        Title = "Đầu Tư Sinh Lời - Quản Trị Rủi Ro"
        Content = "Chào mừng bạn đến với Blog của Văn Hỉ. Nơi cung cấp kiến thức đầu tư thực chiến, phân tích vĩ mô và hỗ trợ mở tài khoản chứng khoán với nhiều đặc quyền."

    # Mạng xã hội & Phễu thu thập Lead
    [[params.socialIcons]]
        name = "youtube"
        url = "https://youtube.com/@VanHiOfficial"
    [[params.socialIcons]]
        name = "zalo"
        url = "https://zalo.me/g/link-group-pheu-vps" # Link group Zalo hỗ trợ chứng khoán

# MENU ĐIỀU HƯỚNG (Tập trung vào điều hướng mở tài khoản)
[[menu.main]]
    identifier = "home"
    name = "TRANG CHỦ"
    url = "/"
    weight = 5
[[menu.main]]
    identifier = "kien-thuc"
    name = "KIẾN THỨC ĐẦU TƯ"
    url = "/posts/"
    weight = 10
[[menu.main]]
    identifier = "huong-dan-vps"
    name = "MỞ TÀI KHOẢN VPS"
    url = "/huong-dan-vps/"
    weight = 15
[[menu.main]]
    identifier = "categories"
    name = "DANH MỤC"
    url = "/categories/"
    weight = 20
[[menu.main]]
    identifier = "tags"
    name = "TỪ KHÓA"
    url = "/tags/"
    weight = 25
[[menu.main]]
    identifier = "search"
    name = "🔍 TÌM KIẾM"
    url = "/search/"
    weight = 30

# KHAI BÁO BỘ LỌC PHÂN LOẠI (Taxonomies)
[taxonomies]
    category = "categories"
    tag = "tags"
