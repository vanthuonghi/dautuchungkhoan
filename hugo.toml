baseURL = "https://dautuchungkhoan.pages.dev/"
languageCode = 'vi-vn'
title = 'Đầu Tư Chứng Khoán Cho Người Mới' # Tiêu đề chính hiển thị trên tab trình duyệt
theme = 'PaperMod'

# Bật tạo file robots.txt tự động - Cực kỳ quan trọng để Google index
enableRobotsTXT = true 
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = false
  minifyOutput = true # Nén toàn bộ code HTML/CSS/JS giúp tải trang tức thì

[params]
  env = "production"
  title = "Đầu Tư Chứng Khoán Cho Người Mới"
  description = "Chia sẻ kiến thức đầu tư, phân tích thị trường và hướng dẫn thực chiến."
  keywords = ["đầu tư chứng khoán", "cổ phiếu", "hướng dẫn vps", "chứng khoán cho người mới", "phân tích kỹ thuật"]
  author = "Chuyên gia ẩn danh" # Phù hợp chiến lược làm web không lộ mặt
  
  defaultTheme = "auto"
  ShowReadingTime = true # Hiển thị thời gian đọc, giữ chân người dùng lâu hơn
  ShowShareButtons = true
  ShowPostNavLinks = true
  
  # Yếu tố On-page SEO cốt lõi
  ShowBreadCrumbs = true # Tạo thẻ điều hướng (Breadcrumbs) giúp Google hiểu cấu trúc web
  ShowToc = true # Hiển thị mục lục (Table of Contents), tạo sitelink trực tiếp trên kết quả tìm kiếm Google
  ShowCodeCopyButtons = true
  
  disableSpecial1stPost = false
  disableScrollToTop = false
  hideFooter = false
  hideHilighlight = false

  [params.profileMode]
    enabled = false # Tắt để sử dụng giao diện Blog chuẩn, tập trung vào danh sách bài viết

  [params.homeInfoParams]
    Title = "Bắt đầu hành trình đầu tư"
    Content = "Nắm bắt kiến thức cốt lõi, quản trị rủi ro và xây dựng danh mục sinh lời bền vững. Tham gia cộng đồng để nhận tín hiệu và tài liệu thực chiến."

[params.socialIcons]
    # Sửa [[params.socialIcons.name]] thành [[params.socialIcons]]
    [[params.socialIcons]]
      name = "Zalo"
      url = "https://zalo.me/g/link-group-pheu-cua-em"

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# Điều hướng Menu rõ ràng giúp tăng trải nghiệm người dùng (UX) và SEO
[[menu.main]]
  identifier = "kien-thuc"
  name = "Kiến Thức Cốt Lõi"
  url = "/categories/kien-thuc/"
  weight = 10

[[menu.main]]
  identifier = "huong-dan-vps"
  name = "Mở Tài Khoản & Khuyến Nghị"
  url = "/huong-dan-vps/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "Chủ Đề"
  url = "/tags/"
  weight = 30
[markup.goldmark.renderer]
  unsafe = true
