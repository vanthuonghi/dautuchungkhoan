baseURL = "https://dautuchungkhoan.pages.dev/" # Đã thêm dấu / ở cuối để tránh lỗi đường dẫn
languageCode = "vi-VN"
title = "Nghiện Cổ Phiếu | Đầu Tư Chứng Khoán Thực Chiến" # Đã sửa lại tên ẩn danh
theme = "PaperMod"

# Tối ưu SEO & Tốc độ
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

# BẬT TÍNH NĂNG TÌM KIẾM CỦA PAPERMOD
[outputs]
    home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
    unsafe = true

[params]
    defaultTheme = "auto"
    ShowReadingTime = true
    ShowShareButtons = true
    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    description = "Chia sẻ kiến thức đầu tư chứng khoán, phân tích thị trường và hướng dẫn thực chiến từ Nghiện Cổ Phiếu."
    author = "Nghiện Cổ Phiếu"

    [params.assets]
        disableHLJS = true
        favicon = "https://img.domain-cua-em.com/logo-ck.png"
        favicon16x16 = "https://img.domain-cua-em.com/logo-ck.png"
        favicon32x32 = "https://img.domain-cua-em.com/logo-ck.png"
        apple_touch_icon = "https://img.domain-cua-em.com/logo-ck.png"
        safari_pinned_tab = "https://img.domain-cua-em.com/logo-ck.png"

    [params.homeInfoParams]
        Title = "Đầu Tư Sinh Lời - Quản Trị Rủi Ro"
        Content = "Chào mừng bạn đến với Blog của Nghiện Cổ Phiếu. Nơi cung cấp kiến thức đầu tư thực chiến, phân tích vĩ mô và hỗ trợ mở tài khoản chứng khoán với nhiều đặc quyền."

    [[params.socialIcons]]
        name = "zalo"
        url = "https://zalo.me/g/link-group-pheu-vps-an-danh"

# MENU ĐIỀU HƯỚNG
[[menu.main]]
    identifier = "home"
    name = "TRANG CHỦ"
    url = "/"
    weight = 5
[[menu.main]]
    identifier = "kien-thuc"
    name = "KIẾN THỨC ĐẦU TƯ"
    url = "/posts/"
    weight = 10
[[menu.main]]
    identifier = "huong-dan-vps"
    name = "MỞ TÀI KHOẢN VPS"
    url = "/huong-dan-vps/"
    weight = 15
[[menu.main]]
    identifier = "categories"
    name = "DANH MỤC"
    url = "/categories/"
    weight = 20
[[menu.main]]
    identifier = "tags"
    name = "TỪ KHÓA"
    url = "/tags/"
    weight = 25
[[menu.main]]
    identifier = "search"
    name = "🔍 TÌM KIẾM"
    url = "/search/"
    weight = 30

[taxonomies]
    category = "categories"
    tag = "tags"
