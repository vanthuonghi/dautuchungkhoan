<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
  {{ $folder := .Get 0 }}
  {{ range (readDir (printf "static/%s" $folder)) }}
    {{ if strings.HasSuffix .Name ".html" }}
      <!-- Bắt đầu 1 thẻ Card -->
      <div class="glass-card rounded-2xl p-8 flex flex-col h-full group">
          <div class="w-14 h-14 rounded-2xl bg-blue-600/20 flex items-center justify-center text-blue-400 text-2xl mb-6">
              <i class="fa-solid fa-file-code"></i>
          </div>
          <h3 class="text-2xl font-bold text-white mb-3">{{ .Name }}</h3>
          <p class="text-slate-400 mb-8 flex-grow">File trình chiếu định dạng HTML.</p>
          <a href="/{{ $folder }}/{{ .Name }}" target="_blank" class="w-full inline-flex justify-center items-center bg-slate-700 hover:bg-blue-600 text-white font-semibold py-3.5 px-4 rounded-xl transition-all duration-300">
              Mở Xem Ngay <i class="fa-solid fa-arrow-up-right-from-square ml-2 text-sm opacity-70"></i>
          </a>
      </div>
    {{ end }}
  {{ end }}
</div>
